# DevSecOps Portal — infrastructure skeleton (M1 is yours to provision/configure).
# Brings up MySQL, Gitea, Jenkins, SonarQube. Portal + staging Tomcat are built/run separately.
# Secrets come from .env (gitignored). Copy .env.example -> .env first.

services:
  mysql:
    image: mysql:8
    container_name: portal-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      # Auto-creates portal + gitea DBs and the portal schema on first boot:
      - ./db/00-init-databases.sql:/docker-entrypoint-initdb.d/00-init-databases.sql:ro
      - ./db/schema.sql:/docker-entrypoint-initdb.d/10-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  gitea:
    image: gitea/gitea:1
    container_name: portal-gitea
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      GITEA__database__DB_TYPE: mysql
      GITEA__database__HOST: mysql:3306
      GITEA__database__NAME: gitea
      GITEA__database__USER: root
      GITEA__database__PASSWD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3001:3000"   # host 3001 -> Gitea 3000 (host 3000 was already in use)
      - "2222:22"     # git over ssh
    volumes:
      - gitea-data:/data

  jenkins:
    build: ./jenkins   # jenkins/jenkins:lts-jdk17 + Docker CLI (for the ZAP/DAST stage)
    container_name: portal-jenkins
    restart: unless-stopped
    user: root   # so the pipeline can invoke the host Docker daemon for ZAP
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock   # ZAP stage runs via Docker

  sonarqube:
    image: sonarqube:community
    container_name: portal-sonarqube
    restart: unless-stopped
    # SonarQube needs ~2GB+ (bundled Elasticsearch). Size the host accordingly.
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    ports:
      - "9000:9000"
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-extensions:/opt/sonarqube/extensions

  # The portal itself — built from source (multi-stage Dockerfile) and served at ROOT.
  # All config comes from .env; DB/host names use the compose service names.
  portal:
    build: ./portal
    container_name: portal-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORTAL_DB_URL: "jdbc:mysql://mysql:3306/portal?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      PORTAL_DB_USER: portal
      PORTAL_DB_PASSWORD: ${PORTAL_DB_PASSWORD}
      GITEA_BASE_URL: http://gitea:3000
      GITEA_API_TOKEN: ${GITEA_API_TOKEN}
      GITEA_OWNER: ${GITEA_OWNER}
      SONAR_BASE_URL: http://sonarqube:9000
      SONAR_API_TOKEN: ${SONAR_API_TOKEN}
      PORTAL_API_TOKEN: ${PORTAL_API_TOKEN}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-opus-4-8}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
    ports:
      - "8081:8080"

  # Empty staging Tomcat — the pipeline deploys your app's WAR here for the DAST scan.
  staging:
    image: tomcat:10-jdk17
    container_name: portal-staging
    restart: unless-stopped
    ports:
      - "8082:8080"

volumes:
  mysql-data:
  gitea-data:
  jenkins-data:
  sonarqube-data:
  sonarqube-extensions:
